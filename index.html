<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flappy Bird</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  canvas {
    background: #000;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
  }
  /* Leaderboard overlay styling handled in canvas, but input needs DOM for accessibility */
  #nameInput {
    position: absolute;
    left: -9999px;
    opacity: 0;
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="600"></canvas>
<input id="nameInput" type="text" maxlength="12" placeholder="Enter name" />
<script>
(function() {
  'use strict';
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Game constants
  const W = 400;
  const H = 600;
  const GRAVITY = 0.22;
  const JUMP = -5.2;
  const TERMINAL_VELOCITY = 7;
  const BIRD_X = 80;
  const BIRD_W = 30;
  const BIRD_H = 22;
  const HITBOX_W = 22;
  const HITBOX_H = 16;
  const PIPE_W = 52;
  const PIPE_GAP = 155;
  const PIPE_SPEED = 1.8;
  const PIPE_SPACING = 280;
  const GROUND_Y = 520;
  const GROUND_H = 80;
  const GAP_MIN_Y = 80;
  const GAP_MAX_Y = 420;
  const WING_CYCLE = 6; // frames per wing frame

  // State
  const STATES = { IDLE: 0, PLAYING: 1, GAME_OVER: 2 };
  let state = STATES.IDLE;
  let frame = 0;

  // Bird physics
  let birdY = H / 2;
  let birdVel = 0;
  let birdRot = 0;
  let wingFrame = 0;

  // Pipes
  let pipes = [];
  let nextPipeX = W + PIPE_SPACING;
  let score = 0;

  // Effects
  let shakeFrames = 0;
  let shakeX = 0;
  let shakeY = 0;
  let flashAlpha = 0;

  // Parallax
  let cloudOffset = 0;
  let hillOffset = 0;
  let groundOffset = 0;

  // Leaderboard / name entry
  let playerName = '';
  let nameCursor = false;
  let cursorTimer = 0;
  let scores = [];
  let submitted = false;
  let fetching = false;

  // Local high score
  let localHigh = parseInt(localStorage.getItem('flappyHigh') || '0', 10) || 0;

  // DOM input helper for mobile keyboards
  const nameInput = document.getElementById('nameInput');

  function resetGame() {
    state = STATES.IDLE;
    birdY = H / 2;
    birdVel = 0;
    birdRot = 0;
    wingFrame = 0;
    pipes = [];
    nextPipeX = W + PIPE_SPACING;
    score = 0;
    shakeFrames = 0;
    flashAlpha = 0;
    playerName = '';
    submitted = false;
    scores = [];
    frame = 0;
  }

  function startGame() {
    state = STATES.PLAYING;
    birdVel = JUMP;
    birdY = H / 2;
    birdRot = -25 * Math.PI / 180;
    pipes = [];
    score = 0;
    shakeFrames = 0;
    flashAlpha = 0;
    frame = 0;
    // Spawn first pipe with a slight delay — starts off-screen right
    nextPipeX = W + 120;
    spawnPipe();
  }

  function jump() {
    if (state === STATES.IDLE) {
      startGame();
    } else if (state === STATES.PLAYING) {
      birdVel = JUMP;
      birdRot = -25 * Math.PI / 180;
    } else if (state === STATES.GAME_OVER) {
      resetGame();
    }
  }

  function randomGapY() {
    return GAP_MIN_Y + Math.random() * (GAP_MAX_Y - GAP_MIN_Y);
  }

  function spawnPipe() {
    const gapY = randomGapY();
    pipes.push({
      x: nextPipeX,
      gapY: gapY,
      passed: false,
    });
    nextPipeX += PIPE_SPACING;
  }

  function update() {
    frame++;

    // Parallax (always scrolls)
    cloudOffset = (cloudOffset + 0.5) % W;
    hillOffset = (hillOffset + 1.0) % W;
    if (state === STATES.PLAYING) {
      groundOffset = (groundOffset + PIPE_SPEED) % 40;
    } else if (state === STATES.IDLE) {
      groundOffset = (groundOffset + 0.5) % 40;
    }

    if (state === STATES.IDLE) {
      // Bobbing bird
      birdY = H / 2 + Math.sin(frame * 0.05) * 10;
      birdRot = Math.sin(frame * 0.05) * 5 * Math.PI / 180;
      wingFrame = Math.floor(frame / WING_CYCLE) % 3;
      return;
    }

    if (state === STATES.PLAYING) {
      // Physics
      birdVel += GRAVITY;
      if (birdVel > TERMINAL_VELOCITY) birdVel = TERMINAL_VELOCITY;
      birdY += birdVel;

      // Rotation lerp toward velocity
      const targetRot = birdVel < 0 ? -25 * Math.PI / 180 : Math.min(90 * Math.PI / 180, birdVel * 6 * Math.PI / 180);
      birdRot += (targetRot - birdRot) * 0.15;

      wingFrame = Math.floor(frame / WING_CYCLE) % 3;

      // Advance pipe spawn tracker
      nextPipeX -= PIPE_SPEED;
      if (nextPipeX <= W + 20) {
        spawnPipe();
      }

      // Move pipes
      for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= PIPE_SPEED;
        if (!pipes[i].passed && pipes[i].x + PIPE_W < BIRD_X - HITBOX_W / 2) {
          pipes[i].passed = true;
          score++;
        }
        if (pipes[i].x + PIPE_W < 0) {
          pipes.shift();
          i--;
        }
      }

      // Collision: ceiling and ground
      if (birdY - HITBOX_H / 2 < 0 || birdY + HITBOX_H / 2 > GROUND_Y) {
        die();
      }

      // Collision: pipes
      const bx = BIRD_X;
      const by = birdY;
      const bhw = HITBOX_W / 2;
      const bhh = HITBOX_H / 2;
      for (const p of pipes) {
        // Top pipe
        if (
          bx + bhw > p.x &&
          bx - bhw < p.x + PIPE_W &&
          by - bhh < p.gapY - PIPE_GAP / 2
        ) {
          die();
        }
        // Bottom pipe
        if (
          bx + bhw > p.x &&
          bx - bhw < p.x + PIPE_W &&
          by + bhh > p.gapY + PIPE_GAP / 2
        ) {
          die();
        }
      }
    }

    if (state === STATES.GAME_OVER) {
      // Screen shake
      if (shakeFrames > 0) {
        shakeFrames--;
        shakeX = (Math.random() - 0.5) * 8;
        shakeY = (Math.random() - 0.5) * 8;
      } else {
        shakeX = 0;
        shakeY = 0;
      }
      // Red flash fade
      if (flashAlpha > 0) {
        flashAlpha -= 0.02;
        if (flashAlpha < 0) flashAlpha = 0;
      }
      // Cursor blink
      cursorTimer++;
      if (cursorTimer % 30 === 0) nameCursor = !nameCursor;
    }
  }

  function die() {
    state = STATES.GAME_OVER;
    shakeFrames = 3;
    flashAlpha = 1.0;
    if (score > localHigh) {
      localHigh = score;
      localStorage.setItem('flappyHigh', String(localHigh));
    }
    // Auto focus hidden input on mobile
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      setTimeout(() => nameInput.focus(), 100);
    }
    fetchScores();
  }

  // --- Drawing ---

  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#4facfe');
    grad.addColorStop(1, '#00f2fe');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawClouds() {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    const clouds = [
      { x: 50, y: 80, rx: 40, ry: 18 },
      { x: 150, y: 140, rx: 55, ry: 22 },
      { x: 280, y: 60, rx: 35, ry: 14 },
      { x: 340, y: 110, rx: 45, ry: 18 },
      { x: 80, y: 200, rx: 50, ry: 20 },
    ];
    for (const c of clouds) {
      let x = ((c.x - cloudOffset) % W);
      if (x < -c.rx * 2) x += W;
      drawEllipse(x + c.rx, c.y, c.rx, c.ry);
    }
  }

  function drawEllipse(cx, cy, rx, ry) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawHills() {
    const colors = ['#2e8b57', '#3cb371', '#228b22'];
    const hillData = [
      { baseY: 480, amp: 40, freq: 0.008, color: colors[0] },
      { baseY: 500, amp: 25, freq: 0.012, color: colors[1] },
      { baseY: 515, amp: 12, freq: 0.018, color: colors[2] },
    ];
    ctx.save();
    for (const hill of hillData) {
      ctx.fillStyle = hill.color;
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 4) {
        const y = hill.baseY - Math.sin((x + hillOffset * hill.freq * 100) * hill.freq) * hill.amp;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawGround() {
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, GROUND_Y, W, GROUND_H);
    // Grass edge
    ctx.fillStyle = '#228B22';
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    for (let x = 0; x <= W; x += 10) {
      const sx = (x - groundOffset) % 40;
      const y = GROUND_Y + (sx < 20 ? -6 : 0);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, GROUND_Y + 4);
    ctx.lineTo(0, GROUND_Y + 4);
    ctx.closePath();
    ctx.fill();
    // Ground stripes
    ctx.strokeStyle = '#A0522D';
    ctx.lineWidth = 2;
    for (let x = ((-groundOffset) % 40); x < W; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y + 8);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
  }

  function drawPipe(p) {
    const topH = p.gapY - PIPE_GAP / 2;
    const bottomY = p.gapY + PIPE_GAP / 2;
    const bottomH = H - bottomY;

    // Pipe body gradient
    const gradTop = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
    gradTop.addColorStop(0, '#74c476');
    gradTop.addColorStop(0.5, '#a1d99b');
    gradTop.addColorStop(1, '#74c476');
    ctx.fillStyle = gradTop;
    ctx.fillRect(p.x, 0, PIPE_W, Math.max(0, topH));

    const gradBot = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
    gradBot.addColorStop(0, '#74c476');
    gradBot.addColorStop(0.5, '#a1d99b');
    gradBot.addColorStop(1, '#74c476');
    ctx.fillStyle = gradBot;
    ctx.fillRect(p.x, bottomY, PIPE_W, Math.max(0, bottomH));

    // Cap
    const capH = 24;
    const capW = PIPE_W + 8;
    const capX = p.x - 4;
    ctx.fillStyle = '#41ab5d';
    ctx.fillRect(capX, topH - capH, capW, capH);
    ctx.fillRect(capX, bottomY, capW, capH);

    // Cap border
    ctx.strokeStyle = '#238b45';
    ctx.lineWidth = 2;
    ctx.strokeRect(capX, topH - capH, capW, capH);
    ctx.strokeRect(capX, bottomY, capW, capH);

    // Highlight strip
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(p.x + 6, 0, 4, Math.max(0, topH));
    ctx.fillRect(p.x + 6, bottomY, 4, Math.max(0, bottomH));
  }

  function drawBird() {
    ctx.save();
    ctx.translate(BIRD_X, birdY);
    ctx.rotate(birdRot);

    // Body
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.ellipse(0, 0, BIRD_W / 2, BIRD_H / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#DAA520';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(6, -5, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(8, -5, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#FF8C00';
    ctx.beginPath();
    ctx.moveTo(10, 2);
    ctx.lineTo(22, 6);
    ctx.lineTo(10, 10);
    ctx.closePath();
    ctx.fill();

    // Wing
    ctx.fillStyle = '#fff';
    const wingY = wingFrame === 0 ? -6 : wingFrame === 1 ? 0 : 4;
    ctx.beginPath();
    ctx.ellipse(-4, wingY, 10, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  }

  function drawScore() {
    if (state === STATES.IDLE) return;
    ctx.save();
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 2;
    ctx.fillText(String(score), W / 2, 60);
    ctx.restore();
  }

  function drawStartScreen() {
    ctx.save();
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetX = 3;
    ctx.shadowOffsetY = 3;
    ctx.fillText('FLAPPY BIRD', W / 2, H / 2 - 60);

    ctx.font = '20px sans-serif';
    ctx.fillStyle = '#eee';
    ctx.fillText('Press Space or Tap to Start', W / 2, H / 2 + 30);
    ctx.restore();
  }

  function drawGameOver() {
    ctx.save();

    // Dark overlay
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);

    // Title
    ctx.font = 'bold 44px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 2;
    ctx.fillText('GAME OVER', W / 2, 100);

    // Score
    ctx.font = '28px sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.shadowBlur = 0;
    ctx.fillText('Score: ' + score, W / 2, 150);
    ctx.fillStyle = '#ccc';
    ctx.fillText('Best: ' + localHigh, W / 2, 185);

    // Name entry prompt
    if (!submitted) {
      ctx.font = '20px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText('Enter Name (3-12 chars):', W / 2, 240);

      // Input box
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      const boxW = 220;
      const boxH = 36;
      const boxX = W / 2 - boxW / 2;
      const boxY = 260;
      ctx.fillRect(boxX, boxY, boxW, boxH);
      ctx.strokeRect(boxX, boxY, boxW, boxH);

      ctx.font = '22px monospace';
      ctx.textAlign = 'left';
      ctx.fillStyle = '#fff';
      let textX = boxX + 10;
      for (let i = 0; i < 12; i++) {
        let ch = '';
        if (i < playerName.length) {
          ch = playerName[i];
        }
        ctx.fillStyle = i < playerName.length ? '#fff' : 'rgba(255,255,255,0.3)';
        if (i === playerName.length && nameCursor) {
          ctx.fillStyle = '#FFD700';
          ch = '_';
        }
        ctx.fillText(ch || (i === playerName.length && nameCursor ? '_' : ''), textX, boxY + 26);
        textX += 18;
      }

      // Submit button
      const btnW = 120;
      const btnH = 36;
      const btnX = W / 2 - btnW / 2;
      const btnY = 310;
      ctx.fillStyle = playerName.length >= 3 ? '#4CAF50' : '#555';
      ctx.fillRect(btnX, btnY, btnW, btnH);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(btnX, btnY, btnW, btnH);
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.fillText('SUBMIT', W / 2, btnY + 25);
    } else {
      ctx.font = '18px sans-serif';
      ctx.fillStyle = '#4CAF50';
      ctx.textAlign = 'center';
      ctx.fillText('Score submitted!', W / 2, 260);
    }

    // Leaderboard
    ctx.font = 'bold 22px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText('Leaderboard', W / 2, 370);

    if (fetching) {
      ctx.font = '16px sans-serif';
      ctx.fillStyle = '#ccc';
      ctx.fillText('Loading...', W / 2, 400);
    } else if (scores.length === 0) {
      ctx.font = '16px sans-serif';
      ctx.fillStyle = '#ccc';
      ctx.fillText('No scores yet', W / 2, 400);
    } else {
      // Table header
      ctx.font = 'bold 14px sans-serif';
      ctx.fillStyle = '#FFD700';
      const cols = [40, 120, 260, 340];
      ctx.textAlign = 'left';
      ctx.fillText('#', cols[0], 395);
      ctx.fillText('Name', cols[1], 395);
      ctx.fillText('Score', cols[2], 395);
      ctx.fillText('Date', cols[3], 395);

      ctx.font = '14px sans-serif';
      ctx.fillStyle = '#eee';
      for (let i = 0; i < scores.length && i < 10; i++) {
        const s = scores[i];
        const y = 395 + (i + 1) * 22;
        ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.12)';
        ctx.fillRect(20, y - 14, W - 40, 20);
        ctx.fillStyle = '#eee';
        ctx.fillText(String(s.rank || i + 1), cols[0], y);
        ctx.fillText(String(s.name).substring(0, 12), cols[1], y);
        ctx.fillText(String(s.score), cols[2], y);
        const dateStr = s.created_at ? s.created_at.substring(0, 10) : '';
        ctx.fillText(dateStr, cols[3], y);
      }
    }

    // Restart hint
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText('Press Space or Tap to Restart', W / 2, 580);

    ctx.restore();
  }

  function draw() {
    ctx.save();

    // Shake offset
    if (shakeFrames > 0) {
      ctx.translate(shakeX, shakeY);
    }

    drawSky();
    drawClouds();
    drawHills();

    // Pipes
    for (const p of pipes) {
      drawPipe(p);
    }

    drawGround();
    drawBird();
    drawScore();

    if (state === STATES.IDLE) {
      drawStartScreen();
    }

    if (state === STATES.GAME_OVER) {
      drawGameOver();
    }

    // Red flash
    if (flashAlpha > 0) {
      ctx.fillStyle = 'rgba(255,0,0,' + flashAlpha + ')';
      ctx.fillRect(-10, -10, W + 20, H + 20);
    }

    ctx.restore();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // --- Input ---

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (state === STATES.GAME_OVER) {
        // Space always restarts if score already submitted or name is empty
        if (submitted || playerName.length === 0) {
          jump();
        }
      } else {
        jump();
      }
    }
    if (state === STATES.GAME_OVER && !submitted) {
      if (e.key === 'Backspace') {
        e.preventDefault();
        playerName = playerName.slice(0, -1);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        submitScore();
      } else if (e.key.length === 1) {
        // Alphanumeric + space
        if (/^[a-zA-Z0-9 ]$/.test(e.key) && playerName.length < 12) {
          playerName += e.key;
        }
      }
    }
  });

  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (state === STATES.GAME_OVER && !submitted) {
      // Check submit button
      const btnW = 120;
      const btnH = 36;
      const btnX = W / 2 - btnW / 2;
      const btnY = 310;
      if (x >= btnX && x <= btnX + btnW && y >= btnY && y <= btnY + btnH) {
        if (playerName.length >= 3) {
          submitScore();
        }
        return;
      }
    }
    jump();
  });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (state === STATES.GAME_OVER && !submitted) {
      // On mobile, focus the hidden input to bring up keyboard
      nameInput.focus();
    }
    jump();
  }, { passive: false });

  // Hidden input sync for mobile
  nameInput.addEventListener('input', (e) => {
    if (state === STATES.GAME_OVER && !submitted) {
      let val = e.target.value;
      val = val.replace(/[^a-zA-Z0-9 ]/g, '');
      if (val.length > 12) val = val.slice(0, 12);
      playerName = val;
      e.target.value = val;
    }
  });
  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && state === STATES.GAME_OVER && !submitted) {
      e.preventDefault();
      submitScore();
    }
  });

  // --- API ---

  async function submitScore() {
    if (submitted || playerName.length < 3) return;
    const name = playerName.trim();
    if (!name || name.length < 3) return;
    submitted = true;
    try {
      const resp = await fetch('/api/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, score: score }),
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      await fetchScores();
    } catch (err) {
      console.error('Submit failed', err);
      submitted = false;
    }
  }

  async function fetchScores() {
    fetching = true;
    try {
      const resp = await fetch('/api/score');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      scores = data.scores || [];
    } catch (err) {
      console.error('Fetch scores failed', err);
      scores = [];
    } finally {
      fetching = false;
    }
  }

  // Start
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
